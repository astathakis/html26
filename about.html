<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about page</title>
  </head>
  <body>
    <h1>about me</h1>

    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Placeat ipsa
      dolorem eaque enim natus expedita animi, alias, voluptatum molestias id
      magnam, eos tenetur.
    </p>
    <h1>forms</h1>
    <form action="/tacos">
      <p>
        <label for="pizza">do you like pizza?</label>
        <input type="checkbox" name="pizza" id="pizza" name="pizza" />
        <label for="coke">do you like coke?</label>
        <input type="checkbox" name="coke" id="coke" />
      </p>

      <p>
        <label for="username">enter your username</label>

        <input
          type="text"
          placeholder="username"
          id="username"
          name="username"
        />
      </p>

      <p>
        <label for="password">enter your password</label>

        <input type="password" placeholder="password" id="password" />
      </p>

      <p>
        <label for="color">enter your fav color</label>

        <input type="color" id="color" />
      </p>

      <p>
        <label for="number">enter a number</label>

        <input type="number" placeholder="enter a number" id="number" />
      </p>

      <p>
        <label for="meal"></label>
        <select name="meal" id="meal">
          <option value="">please select an option</option>
          <option value="fish">fish</option>
          <option value="steak">steak</option>
          <option value="chicken">chicken</option>
        </select>
      </p>

      <button type="button">submit</button>
      <input type="submit" value="submit" />
    </form>

    <a href="./index.html">home</a>
  </body>
</html>
